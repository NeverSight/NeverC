name: windows-x64-neverc-build

permissions:
  contents: write

on: [push, pull_request]

jobs:
  build:
    if: >-
      !startsWith(github.ref, 'refs/tags/') &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository))
    runs-on: windows-latest
    env:
      BUILD_TYPE: Release
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        path: neverc

    - name: Setup build deps
      run: choco install ninja cmake 7zip -y

    - name: Resolve latest LLVM version
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        LLVM_VERIFY_ASSET_SUFFIX: win64.exe
      run: bash ./neverc/.github/scripts/resolve-llvm-version.sh

    - name: Cache LLVM toolchain
      uses: actions/cache@v4
      with:
        path: C:\LLVM
        key: llvm-${{ env.LLVM_VER }}-win64

    - name: Install PGO-optimised Clang
      shell: pwsh
      run: ./neverc/.github/scripts/install-llvm-windows.ps1

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build neverc
      shell: bash
      run: |
        cmake -GNinja -Bbuild \
        -DCMAKE_C_COMPILER="${PGO_CLANG}" \
        -DCMAKE_CXX_COMPILER="${PGO_CLANGXX}" \
        -DCMAKE_INSTALL_PREFIX=install \
        -DLLVM_ENABLE_ASSERTIONS=OFF \
        -DLLVM_TOOL_LLVM_SHLIB_BUILD=off \
        -DNEVERC_INCLUDE_TESTS=ON \
        -DNEVERC_ENABLE_LTO=ON \
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
        -C neverc/neverc/cmake/caches/NeverC.cmake \
        neverc/llvm
        cmake --build build --config ${{ env.BUILD_TYPE }} --target neverc

    - name: Build bundled Windows runtime
      shell: bash
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --target neverc-runtime-x64-msvc neverc-runtime-shared-msvc

    - name: Build Plugin SDK
      shell: bash
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --target neverc-pluginsdk

    - name: Test Plugin SDK (build + load)
      shell: bash
      run: |
        set -e
        make -C build/pluginsdk/examples \
          NEVERC=$PWD/build/bin/neverc \
          INCLUDE_DIR=$PWD/build/pluginsdk/include
        printf 'int main(void) { return 0; }\n' > /tmp/plugin_test.c
        for plugin in ExamplePlugin CrtShimPlugin BenchPlugin; do
          echo "--- Testing $plugin ---"
          build/bin/neverc \
            --target=x86_64-pc-windows-msvc \
            -fplugin-pass=build/pluginsdk/examples/${plugin}.dll \
            -c /tmp/plugin_test.c -o /tmp/plugin_test.obj
          echo "--- $plugin OK ---"
        done

    - name: Run neverc tests
      shell: bash
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --target check-neverc

    - name: Install neverc
      shell: bash
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --target install

    - name: Package neverc
      run: 7z a windows-x64-neverc.zip install

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64-neverc
        path: windows-x64-neverc.zip
