name: windows-x64-neverc-build

permissions:
  contents: write

on: [push, pull_request]

jobs:
  build:
    if: >-
      !startsWith(github.ref, 'refs/tags/') &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository))
    runs-on: windows-latest
    env:
      BUILD_TYPE: Release
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        path: neverc
        submodules: 'recursive'

    - name: Setup build deps
      run: choco install ninja cmake 7zip -y

    - name: Download PGO-optimised Clang
      shell: bash
      run: |
        LLVM_VER=20.1.8
        curl -fsSL \
          "https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VER}/LLVM-${LLVM_VER}-win64.exe" \
          -o /tmp/llvm-installer.exe
        # Silent install to C:\LLVM
        /tmp/llvm-installer.exe /S /D=C:\\LLVM
        echo "PGO_CLANG=C:/LLVM/bin/clang.exe" >> "$GITHUB_ENV"
        echo "PGO_CLANGXX=C:/LLVM/bin/clang++.exe" >> "$GITHUB_ENV"
        echo "C:/LLVM/bin" >> "$GITHUB_PATH"

    - name: Verify Clang
      run: clang --version

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build neverc
      shell: bash
      run: |
        cmake -GNinja -Bbuild \
        -DCMAKE_C_COMPILER="${PGO_CLANG}" \
        -DCMAKE_CXX_COMPILER="${PGO_CLANGXX}" \
        -DCMAKE_INSTALL_PREFIX=install \
        -DLLVM_ENABLE_ASSERTIONS=OFF \
        -DLLVM_TOOL_LLVM_SHLIB_BUILD=off \
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
        -C neverc/neverc/cmake/caches/NeverC.cmake \
        neverc/llvm
        cmake --build build --config ${{ env.BUILD_TYPE }} --target neverc
        cmake --build build --config ${{ env.BUILD_TYPE }} --target install

    - name: Package neverc
      run: 7z a windows-x64-neverc.zip install

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64-neverc
        path: windows-x64-neverc.zip
