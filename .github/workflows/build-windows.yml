name: windows-x64-neverc-build

permissions:
  contents: write

on: [push, pull_request]

jobs:
  build:
    if: >-
      !startsWith(github.ref, 'refs/tags/') &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository))
    runs-on: windows-latest
    timeout-minutes: 360
    env:
      BUILD_TYPE: Release
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        path: neverc
        submodules: 'recursive'

    - name: Setup build deps
      run: choco install ninja cmake 7zip -y

    - name: Resolve latest LLVM version
      shell: bash
      run: bash ./neverc/.github/scripts/resolve-llvm-version.sh

    - name: Cache LLVM toolchain
      uses: actions/cache@v4
      with:
        path: C:\LLVM
        key: llvm-${{ env.LLVM_VER }}-win64

    - name: Install PGO-optimised Clang
      shell: pwsh
      run: ./neverc/.github/scripts/install-llvm-windows.ps1

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build neverc
      shell: bash
      run: |
        cmake -GNinja -Bbuild \
        -DCMAKE_C_COMPILER="${PGO_CLANG}" \
        -DCMAKE_CXX_COMPILER="${PGO_CLANGXX}" \
        -DCMAKE_INSTALL_PREFIX=install \
        -DLLVM_ENABLE_ASSERTIONS=OFF \
        -DLLVM_TOOL_LLVM_SHLIB_BUILD=off \
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
        -C neverc/neverc/cmake/caches/NeverC.cmake \
        neverc/llvm
        cmake --build build --config ${{ env.BUILD_TYPE }} --target neverc
        cmake --build build --config ${{ env.BUILD_TYPE }} --target install

    - name: Package neverc
      run: 7z a windows-x64-neverc.zip install

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64-neverc
        path: windows-x64-neverc.zip
