name: linux-x64-neverc-build

permissions:
  contents: write

on: [push, pull_request]

jobs:
  build:
    if: >-
      !startsWith(github.ref, 'refs/tags/') &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository))
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        path: neverc

    - name: Setup build deps
      run: sudo apt-get update && sudo apt-get install -y ninja-build cmake p7zip-full gdb

    - name: Resolve latest LLVM version
      env:
        GITHUB_TOKEN: ${{ github.token }}
        LLVM_VERIFY_ASSET_SUFFIX: Linux-X64.tar.xz
      run: bash ./neverc/.github/scripts/resolve-llvm-version.sh

    - name: Cache LLVM toolchain
      uses: actions/cache@v4
      with:
        path: /tmp/llvm-pgo
        key: llvm-${{ env.LLVM_VER }}-linux-x64

    - name: Install PGO-optimised Clang
      run: bash ./neverc/.github/scripts/install-llvm-linux.sh

    - name: Build neverc
      run: |
        cmake -GNinja -Bbuild \
        -DCMAKE_C_COMPILER=${{ env.PGO_CLANG }} \
        -DCMAKE_CXX_COMPILER=${{ env.PGO_CLANGXX }} \
        -DCMAKE_INSTALL_PREFIX=install \
        -DLLVM_ENABLE_ASSERTIONS=OFF \
        -DLLVM_TOOL_LLVM_SHLIB_BUILD=off \
        -DNEVERC_INCLUDE_TESTS=ON \
        -DNEVERC_ENABLE_LTO=ON \
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
        -C neverc/neverc/cmake/caches/NeverC.cmake \
        neverc/llvm
        time cmake --build build --config ${{ env.BUILD_TYPE }} --target neverc

    - name: Build Plugin SDK
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --target neverc-pluginsdk

    - name: Test Plugin SDK (build + load)
      run: |
        set -e
        make -C build/pluginsdk/examples \
          NEVERC=$PWD/build/bin/neverc \
          INCLUDE_DIR=$PWD/build/pluginsdk/include
        printf 'int main(void) { return 0; }\n' > /tmp/plugin_test.c
        for plugin in ExamplePlugin CrtShimPlugin BenchPlugin; do
          echo "--- Testing $plugin ---"
          build/bin/neverc \
            --target=x86_64-pc-windows-msvc \
            -fplugin-pass=build/pluginsdk/examples/${plugin}.so \
            -c /tmp/plugin_test.c -o /tmp/plugin_test.obj
          echo "--- $plugin OK ---"
        done

    - name: Run neverc tests
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --target check-neverc
      continue-on-error: true

    - name: Debug runtime crash (GDB backtrace)
      if: always()
      run: |
        set +e
        echo "=== Compiling test_basic.c ==="
        build/bin/neverc tests/neverc/test_basic.c -o /tmp/test_basic_dbg -g
        echo "=== readelf -l (program headers) ==="
        readelf -l /tmp/test_basic_dbg 2>/dev/null || true
        echo "=== readelf -d (dynamic section) ==="
        readelf -d /tmp/test_basic_dbg 2>/dev/null || true
        echo "=== ldd ==="
        ldd /tmp/test_basic_dbg 2>/dev/null || true
        echo "=== GDB backtrace ==="
        echo -e "set confirm off\nset pagination off\nrun\nbt full\ninfo registers\nquit" \
          | gdb -batch -q /tmp/test_basic_dbg 2>&1 | head -100
        echo "=== Compiling minimal test ==="
        cat > /tmp/minimal.c << 'CEOF'
        int main(void) { return 42; }
        CEOF
        build/bin/neverc /tmp/minimal.c -o /tmp/minimal_test
        /tmp/minimal_test; echo "minimal exit: $?"
        echo "=== Compiling printf test ==="
        cat > /tmp/printf_test.c << 'CEOF'
        #include <stdio.h>
        int main(void) { printf("hello\n"); return 0; }
        CEOF
        build/bin/neverc /tmp/printf_test.c -o /tmp/printf_test
        /tmp/printf_test; echo "printf exit: $?"

    - name: Install neverc
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --target install

    - name: Package neverc
      run: 7z a linux-x64-neverc.zip install

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-x64-neverc
        path: linux-x64-neverc.zip
