name: macos-arm64-neverc-build

permissions:
  contents: write

on: [push, pull_request]

jobs:
  build:
    # Version tags use release-pgo-macos.yml (PGO release build).
    if: >-
      !startsWith(github.ref, 'refs/tags/') &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository))
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    env:
      BUILD_TYPE: Release
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: neverc

      - name: Select latest stable Xcode (Apple Clang)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Apple toolchain
        run: |
          xcodebuild -version
          clang --version
          which clang

      - name: Setup build deps
        run: brew install ninja cmake p7zip

      - name: Build neverc
        run: |
          cmake -GNinja -Bbuild \
            -DCMAKE_INSTALL_PREFIX=install \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_TOOL_LLVM_SHLIB_BUILD=off \
            -DHAVE_STD_IS_TRIVIALLY_COPYABLE=0 \
            -DNEVERC_INCLUDE_TESTS=ON \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -C neverc/neverc/cmake/caches/NeverC.cmake \
            neverc/llvm
          time cmake --build build --config ${{ env.BUILD_TYPE }} --target neverc

      - name: Build Plugin SDK
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --target neverc-pluginsdk

      - name: Test Plugin SDK (build + load)
        run: |
          set -e
          make -C build/pluginsdk/examples \
            NEVERC=$PWD/build/bin/neverc \
            INCLUDE_DIR=$PWD/build/pluginsdk/include
          printf 'int main(void) { return 0; }\n' > /tmp/plugin_test.c
          for plugin in ExamplePlugin CrtShimPlugin BenchPlugin; do
            echo "--- Testing $plugin ---"
            build/bin/neverc \
              --target=x86_64-pc-windows-msvc \
              -fplugin-pass=build/pluginsdk/examples/${plugin}.dylib \
              -c /tmp/plugin_test.c -o /tmp/plugin_test.obj
            echo "--- $plugin OK ---"
          done

      - name: Run neverc tests
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --target check-neverc

      - name: Install neverc
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --target install

      - name: Package neverc
        run: 7z a macos-arm64-neverc.zip install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-neverc
          path: macos-arm64-neverc.zip
