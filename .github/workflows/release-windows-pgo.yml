# Profile-guided release build for Windows x86_64.
# Tag push: full PGO pipeline + GitHub Release upload.
# Manual dispatch: same pipeline but artifacts only (no release).
#
# Strategy: Windows runners are too slow for the full instrumented-build +
# training pipeline (~180 min+).  Instead we reuse profdata cached by the
# Linux PGO workflow — LLVM's PGO profdata is cross-platform (function names
# + edge counts only, no platform-specific data).  If no profdata is
# available yet (first-ever run), we fall back to a regular Release build.
name: windows-x64-neverc-release-pgo

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  pgo-release:
    name: PGO release
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build deps
        run: choco install ninja cmake 7zip -y

      - name: Resolve latest LLVM version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLVM_VERIFY_ASSET_SUFFIX: win64.exe
        run: bash ./.github/scripts/resolve-llvm-version.sh

      - name: Cache LLVM toolchain
        uses: actions/cache@v4
        with:
          path: C:\LLVM
          key: llvm-${{ env.LLVM_VER }}-win64

      - name: Install PGO-optimised Clang
        shell: pwsh
        run: ./.github/scripts/install-llvm-windows.ps1

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # ── sccache ──────────────────────────────────────────────
      - name: Setup sccache
        uses: mozilla/sccache-action@v0.0.7

      - name: Verify sccache
        shell: bash
        run: |
          echo "sccache location: $(which sccache || echo 'NOT FOUND')"
          sccache --version || true

      # ── Restore profdata ─────────────────────────────────────
      # Try in order:
      #   1. Windows-specific profdata from a previous run
      #   2. Linux profdata (cross-platform compatible)
      - name: Restore PGO profile data
        id: cache-profdata
        uses: actions/cache/restore@v4
        with:
          path: pgo-profiles/merged.profdata
          key: pgo-profdata-win-${{ hashFiles('neverc/lib/**', 'neverc/include/**') }}
          restore-keys: |
            pgo-profdata-win-
            pgo-profdata-linux-

      - name: Check profdata availability
        id: check-profdata
        shell: bash
        run: |
          if [ -f pgo-profiles/merged.profdata ]; then
            echo "has_profdata=true" >> "$GITHUB_OUTPUT"
            ls -lh pgo-profiles/merged.profdata
            echo "PGO profile data found — building with profile-guided optimisation"
          else
            echo "has_profdata=false" >> "$GITHUB_OUTPUT"
            echo "No profile data available — building standard Release (PGO will be available after the Linux PGO workflow runs)"
          fi

      # ── Build (PGO-optimised when profdata is available) ─────
      - name: Build neverc (PGO-optimised)
        if: steps.check-profdata.outputs.has_profdata == 'true'
        shell: bash
        run: |
          PROFDATA="${GITHUB_WORKSPACE}/pgo-profiles/merged.profdata"
          cmake -S llvm -B build -G Ninja \
            -C neverc/cmake/caches/NeverC.cmake \
            -DCMAKE_C_FLAGS_RELEASE="-O2 -DNDEBUG -fprofile-instr-use=${PROFDATA} -ffunction-sections -fdata-sections" \
            -DCMAKE_CXX_FLAGS_RELEASE="-O2 -DNDEBUG -fprofile-instr-use=${PROFDATA} -ffunction-sections -fdata-sections" \
            -DCMAKE_EXE_LINKER_FLAGS=""
          cmake --build build --target neverc --parallel $NUMBER_OF_PROCESSORS

      - name: Build neverc (standard release)
        if: steps.check-profdata.outputs.has_profdata != 'true'
        shell: bash
        run: |
          cmake -S llvm -B build -G Ninja \
            -C neverc/cmake/caches/NeverC.cmake
          cmake --build build --target neverc --parallel $NUMBER_OF_PROCESSORS

      - name: Show sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

      - name: Install neverc
        run: cmake --install build --prefix "$env:GITHUB_WORKSPACE\install"

      - name: Package
        run: 7z a windows-x64-neverc-pgo.zip install

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-neverc-pgo
          path: windows-x64-neverc-pgo.zip

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, '-pre') || contains(github.ref, '-rc') }}
          files: windows-x64-neverc-pgo.zip
